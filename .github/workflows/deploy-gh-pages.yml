name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
        env:
          BASE_PATH: /baseball_app

      # SPA fallback: 404.html serves index.html so wouter handles routing
      - run: cp dist/public/index.html dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - id: deployment
        uses: actions/deploy-pages@v4
