server {
    listen 80;
    server_name api.fullcount.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.fullcount.kr;

    ssl_certificate /etc/nginx/ssl/api.fullcount.kr.cer;
    ssl_certificate_key /etc/nginx/ssl/api.fullcount.kr.key;

    location /widget-data {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ { alias /var/www/static/; expires 30d; add_header Cache-Control "public, immutable"; add_header Access-Control-Allow-Origin "*"; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
