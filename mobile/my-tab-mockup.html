<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my.tsx UI 구성</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: -apple-system, sans-serif; }
  .phone { width: 375px; background: #fff; border-radius: 32px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; padding-bottom: 40px; }
  .scroll { max-height: 700px; overflow-y: auto; padding: 0 20px; }

  .header { padding-top: 24px; padding-bottom: 12px; }
  .header h1 { font-size: 24px; font-weight: bold; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }

  .section { margin-top: 24px; }
  .section-title { font-size: 16px; font-weight: bold; color: #111; margin-bottom: 12px; }

  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; padding: 16px; }
  .card-row { flex-direction: row; display: flex; align-items: center; gap: 12px; }
  .arrow { font-size: 22px; color: #999; margin-left: auto; }

  .badge { width: 36px; height: 36px; border-radius: 18px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; flex-shrink: 0; }

  .team-row { display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 16px; border: 1px solid #e5e7eb; }
  .team-badge { width: 36px; height: 36px; border-radius: 18px; font-size: 18px; display: flex; align-items: center; justify-content: center; }

  .profile-row { display: flex; align-items: center; gap: 16px; }
  .profile-img { width: 56px; height: 56px; border-radius: 28px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .profile-change { font-size: 10px; color: #999; text-align: center; margin-top: 2px; }

  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #e5e7eb; }
  .setting-label { font-size: 14px; color: #111; }

  .section-divider { height: 1px; background: #e5e7eb; margin: 16px 0; }

  .preview-emojis { display: flex; gap: 6px; }
  .preview-emoji { width: 28px; height: 28px; border-radius: 6px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 12px; }

  .totem-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .totem-card { width: 47%; border-radius: 16px; border: 1px solid; padding: 14px 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .totem-emoji { font-size: 28px; }
  .totem-name { font-size: 14px; font-weight: 700; text-align: center; }
  .totem-stats { display: flex; gap: 12px; font-size: 12px; }
  .totem-close { position: absolute; right: -4px; top: -2px; width: 22px; height: 22px; border-radius: 11px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #999; }

  .section-header-right { font-size: 14px; font-weight: 600; color: #111; cursor: pointer; }
  .placeholder-text { font-size: 13px; color: #999; padding: 16px 0; }

  .version { font-size: 12px; color: #999; text-align: center; margin-top: 24px; }
  .danger { color: #e74c3c; }

  .section-border { border: 2px dashed #3b82f6; border-radius: 8px; padding: 8px; margin-bottom: 8px; position: relative; }
  .section-label { position: absolute; top: -10px; left: 12px; background: #fff; padding: 0 6px; font-size: 11px; color: #3b82f6; font-weight: 600; }
  .totem-section-border { border: 2px dashed #22c55e; border-radius: 8px; padding: 8px; margin: 16px 0 0; position: relative; }
  .totem-section-label { position: absolute; top: -10px; right: 12px; background: #fff; padding: 0 6px; font-size: 11px; color: #22c55e; font-weight: 600; }

  .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">

    <!-- HEADER -->
    <div class="header">
      <h1>MY</h1>
      <p>프로필, 응원팀, 직관기록, 통계</p>
    </div>

    <!-- 내 응원팀 -->
    <div class="section">
      <div class="section-title">내 응원팀</div>
      <div class="team-row">
        <div class="team-badge" style="background:#c8102e; color:#fff;">LG</div>
        <div style="flex:1; font-size:18px; font-weight:bold; color:#c8102e;">LG 트윈스</div>
        <span class="arrow">›</span>
      </div>
    </div>

    <!-- 프로필 -->
    <div class="section">
      <div class="section-title">프로필</div>
      <div class="profile-row">
        <div style="align-items:center; display:flex; flex-direction:column;">
          <div class="profile-img" style="background:#c8102e;">😎</div>
          <div class="profile-change">변경</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:18px; font-weight:600;">풀카운트</div>
          <div style="font-size:12px; color:#999; margin-top:2px;">탭하여 변경</div>
        </div>
      </div>
    </div>

    <!-- 화면 설정 -->
    <div class="section">
      <div class="section-title">화면 설정</div>
      <div class="setting-row">
        <span class="setting-label">다크 모드</span>
        <span style="width:48px; height:28px; border-radius:14px; background:#ddd; position:relative;">
          <span style="position:absolute; left:2px; top:2px; width:24px; height:24px; border-radius:12px; background:#fff;"></span>
        </span>
      </div>
    </div>

    <!-- === 모아보기 섹션 (파란 테두리) === -->
    <div class="section-border">
      <div class="section-label">모아보기 (하나의 View)</div>

      <!-- 시즌 리캡 -->
      <div class="section-title" style="margin-bottom:12px;">모아보기</div>
      <div class="card card-row" style="margin-bottom:12px;">
        <span style="font-size:28px;">⚾</span>
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:700;">2026 시즌 리캡</div>
          <div style="font-size:12px; color:#999; margin-top:2px;">나의 야구 시즌을 돌아보기</div>
        </div>
        <span class="arrow">›</span>
      </div>

      <!-- 도전과제 -->
      <div class="card card-row" style="margin-bottom:0;">
        <span style="font-size:28px;">🥇</span>
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:700;">도전과제</div>
          <div style="font-size:12px; color:#999;">3/42 획득 · LV.2</div>
        </div>
        <div class="preview-emojis">
          <span class="preview-emoji">🏆</span>
          <span class="preview-emoji">🔥</span>
          <span class="preview-emoji">🎯</span>
          <span class="preview-emoji">⭐</span>
          <span class="preview-emoji">💎</span>
        </div>
        <span class="arrow">›</span>
      </div>

      <!-- 컬렉션 -->
      <div class="card card-row" style="margin-top:12px; margin-bottom:0;">
        <span style="font-size:28px;">📦</span>
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:700;">컬렉션</div>
          <div style="font-size:12px; color:#999;">0개 아이템</div>
        </div>
        <div class="preview-emojis"></div>
        <span class="arrow">›</span>
      </div>

      <!-- === 나의 토템 (초록 테두리) === -->
      <div class="totem-section-border">
        <div class="totem-section-label">나의 토템 (모아보기 내부)</div>
        <div class="group-header">
          <div class="section-title" style="margin-bottom:0;">나의 토템</div>
          <span class="section-header-right">+ 추가</span>
        </div>
        <div class="placeholder-text">아직 등록된 토템이 없어요. 토템을 추가해보세요!</div>
      </div>
    </div>

    <!-- 정보 -->
    <div class="section">
      <div class="section-title">정보</div>
      <div class="setting-row"><span class="setting-label">개인정보처리방침</span></div>
      <div class="setting-row"><span class="setting-label">이용약관</span></div>
      <div class="setting-row"><span class="setting-label">문의하기</span></div>
      <div class="version">v1.0.9</div>
    </div>

    <!-- 데이터 관리 -->
    <div class="section">
      <div class="section-title">데이터 관리</div>
      <div class="setting-row"><span class="setting-label danger">모든 데이터 초기화</span></div>
    </div>

  </div>
</div>
</body>
</html>
